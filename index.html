<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Retail Analytics BI Dashboard MVP</title>
  <!-- Load React, PropTypes, Recharts, Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Fetch the JSX file, transform imports/exports, resolve globals, compile and run
    fetch('./dashboard.jsx')
      .then(response => {
        if (!response.ok) {
          throw new Error('HTTP status ' + response.status);
        }
        return response.text();
      })
      .then(code => {
        // Completely strip multiline ES6 bare imports and standard export default statement
        let cleanCode = code
          .replace(/import\s+[\s\S]*?\s+from\s+['"].*?['"];?/g, '')
          .replace(/export\s+default\s+/g, '');

        // Define browser globals mapping React and Recharts APIs
        const prefix = `
          const { useState, useMemo, useRef } = React;
          const {
            ResponsiveContainer, LineChart, Line, BarChart, Bar,
            PieChart, Pie, Cell, ScatterChart, Scatter, XAxis, YAxis, ZAxis,
            CartesianGrid, Tooltip, Legend, LabelList
          } = Recharts;
        `;

        const finalCode = prefix + cleanCode + `
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<App />);
        `;

        // Transpile on the fly with Babel Standalone
        const compiled = Babel.transform(finalCode, { presets: ['react'] }).code;
        const script = document.createElement('script');
        script.text = compiled;
        document.body.appendChild(script);
      })
      .catch(err => {
        console.error('Failed to load JSX file:', err);
        document.getElementById('root').innerHTML = `
          <div style="padding: 20px; font-family: sans-serif; line-height: 1.6; max-width: 600px; margin: 40px auto; background: #fff5f5; border: 1px solid #ffc9c9; border-radius: 8px;">
            <h3 style="color: #c53030; margin-top: 0;">Error Loading Dashboard MVP</h3>
            <p>Could not fetch <code>retail_bi_dashboard_final (1).jsx</code>: <strong>${err.message}</strong></p>
            <p>To view this page, you <strong>must run a local HTTP server</strong> in this directory because browsers block local file fetching (CORS policy) when loaded via <code>file://</code>.</p>
            <hr style="border: 0; border-top: 1px solid #ffc9c9; margin: 16px 0;">
            <h4 style="margin-bottom: 8px;">How to start the server:</h4>
            <pre style="background: #fff; padding: 10px; border-radius: 4px; border: 1px solid #ffd8d8; overflow-x: auto;"><code># Run in your project directory:\nnpx http-server -p 8080</code></pre>
            <p>Then open: <a href="http://localhost:8080/temp_mvp.html" style="color: #3182ce; text-decoration: none; font-weight: bold;">http://localhost:8080/temp_mvp.html</a></p>
          </div>
        `;
      });
  </script>
</body>
</html>
